<button
  class="btn btn-primary rounded-brand shadow-brand-sm flex items-center gap-2 px-8 disabled:pointer-events-none"
  [class.btn-disabled]="disabled() || saving()"
  [disabled]="disabled() || saving()"
  (click)="onClick()"
>
  @if (saving()) {
    <span class="loading loading-spinner loading-sm"></span>
    Salvando…
  } @else if (saved()) {
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="h-5 w-5"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <polyline points="20 6 9 17 4 12" />
    </svg>
    Salvo
  } @else {
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="h-5 w-5"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path
        d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"
      />
      <polyline points="17 21 17 13 7 13 7 21" />
      <polyline points="7 3 7 8 15 8" />
    </svg>
    {{ label() }}
  }
</button>
