<router-outlet />

@if (error()) {
  <div class="pointer-events-none fixed inset-x-0 bottom-4 z-50 flex justify-center px-4">
    <div class="pointer-events-auto flex max-w-lg items-start gap-4 rounded-[1.5rem] border border-primary-100 bg-white px-5 py-4 shadow-[0_18px_45px_rgba(26,26,46,0.14)]">
      <div class="bg-primary-50 text-primary grid size-10 shrink-0 place-items-center rounded-full text-lg font-black">!</div>
      <div>
        <p class="text-neutral text-sm font-black">Atenção</p>
        <p class="mt-1 text-sm leading-6 text-neutral-500">{{ error() }}</p>
      </div>
      <button
        type="button"
        class="text-neutral-400 transition hover:text-neutral-700"
        aria-label="Fechar aviso"
        (click)="dismissError()"
      >
        ×
      </button>
    </div>
  </div>
}
